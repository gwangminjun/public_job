<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Public Job Portal</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(92vw, 420px);
        background: rgba(30, 41, 59, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 16px;
        padding: 24px;
      }
      h1 { margin: 0 0 8px; font-size: 20px; }
      p { margin: 0; line-height: 1.5; color: #cbd5e1; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>오프라인 상태입니다</h1>
      <p>네트워크 연결 후 다시 시도해 주세요. 최근 방문한 페이지는 일부 캐시로 열릴 수 있습니다.</p>
    </main>
  </body>
</html>
